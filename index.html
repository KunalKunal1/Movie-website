<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Global Movie Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎬 Global Movie Hub</h1>
    <nav>
        <ul>
            <li><a href="#" onclick="showSection('home')">Home</a></li>
            <li><a href="#" onclick="showSection('movies')">Movies</a></li>
            <li><a href="#" onclick="showSection('add')">Add Movie</a></li>
        </ul>
    </nav>
</header>

<section id="home" class="section active">
    <h2>Welcome to Global Movie Hub</h2>
    <p>Explore movies by country and language.</p>
</section>

<section id="movies" class="section">
    <h2>Browse Movies</h2>

    <div class="filters">
        <select id="countryFilter" onchange="filterMovies()">
            <option value="">All Countries</option>
        </select>

        <select id="languageFilter" onchange="filterMovies()">
            <option value="">All Languages</option>
        </select>
    </div>

    <div id="movieContainer" class="movie-grid"></div>
</section>

<section id="add" class="section">
    <h2>Add New Movie</h2>
    <form id="movieForm">
        <input type="text" id="title" placeholder="Movie Title" required>
        <input type="text" id="country" placeholder="Country" required>
        <input type="text" id="language" placeholder="Language" required>
        <input type="number" id="year" placeholder="Release Year" required>
        <textarea id="description" placeholder="Description" required></textarea>
        <button type="submit">Add Movie</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
