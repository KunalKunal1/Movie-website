<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Movie Hub</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🎬 Global Movie Hub</h1>
    <nav>
        <a onclick="showSection('home')">Home</a>
        <a onclick="showSection('movies')">Movies</a>
        <a onclick="showSection('add')">Add Movie</a>
    </nav>
</header>

<section id="home" class="section active">
    <div class="hero">
        <h2>Discover Movies Worldwide</h2>
        <p>Search, Filter, Explore & Add Your Favorites</p>
    </div>
</section>

<section id="movies" class="section">
    <div class="controls">
        <input type="text" id="searchBar" placeholder="Search movie..." onkeyup="searchMovies()">

        <select id="countryFilter" onchange="filterMovies()">
            <option value="">All Countries</option>
        </select>

        <select id="languageFilter" onchange="filterMovies()">
            <option value="">All Languages</option>
        </select>
    </div>

    <div id="movieContainer" class="movie-grid"></div>
</section>

<section id="add" class="section">
    <h2>Add New Movie</h2>
    <form id="movieForm">
        <input type="text" id="title" placeholder="Movie Title" required>
        <input type="text" id="country" placeholder="Country" required>
        <input type="text" id="language" placeholder="Language" required>
        <input type="number" id="year" placeholder="Release Year" required>
        <input type="number" id="rating" placeholder="Rating (1-5)" min="1" max="5" required>
        <input type="text" id="poster" placeholder="Poster Image URL" required>
        <textarea id="description" placeholder="Description" required></textarea>
        <button type="submit">Add Movie</button>
    </form>
</section>

<script src="script.js"></script>
</body>
</html>
